name: personal_webpage
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  font_awesome_flutter: ^11.0.0
  url_launcher: ^6.3.1
  tw_chat:
    path: packages/tw_chat
  tw_keywords:
    path: packages/tw_keywords
  flutter_svg: ^2.2.0
  http: ^1.4.0
  super_editor: ^0.3.0-dev.51

dependency_overrides:
  super_editor:
    path: packages/super_editor_local

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/data/subjects/index.json
    - assets/data/subjects/terese.json

  fonts:
    - family: Inter18pt
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-Light.ttf
          weight: 300
        - asset: assets/fonts/inter/Inter_18pt-Medium.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter_18pt-SemiBold.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter_18pt-Bold.ttf
          weight: 700
    - family: ComingSoon
      fonts:
        - asset: assets/fonts/comingsoon/ComingSoon-Regular.ttf
          weight: 400
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
          weight: 400

