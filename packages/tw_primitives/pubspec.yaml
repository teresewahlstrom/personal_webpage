name: tw_primitives
description: Internal primitives package for the personal_webpage Flutter app. Contains reusable UI components and utilities.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  attributed_text: ^0.4.5
  characters: ^1.3.0
  collection: ^1.15.0
  dart_quill_delta: ^9.4.1
  follow_the_leader: ^0.5.3
  http: ^1.2.2
  linkify: ^5.0.0
  logging: ^1.3.0
  markdown: ^7.2.1
  super_text_layout: ^0.1.20
  super_keyboard: ^0.4.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  overlord: ^0.4.2
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  args: ^2.3.1
  flutter_test_runners: ^0.0.4
  flutter_test_goldens: ^0.0.7
  golden_bricks: ^1.0.0
  golden_runner: ^0.2.0

flutter:
  uses-material-design: true
