name: tw_primitives
description: Internal primitives package for the personal_webpage Flutter app. Contains reusable UI components and utilities.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  attributed_text: ^0.4.5
  characters: ^1.3.0
  collection: ^1.15.0
  follow_the_leader: ^0.5.3
  logging: ^1.3.0
  super_text_layout: ^0.1.20
  url_launcher: ^6.3.1
  overlord: ^0.4.2
  vector_math: ^2.2.0
  web: ^1.1.1
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  args: ^2.3.1
  flutter_test_runners: ^0.0.4
  flutter_test_goldens: ^0.0.7
  golden_bricks: ^1.0.0
  golden_runner: ^0.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/arrow2.svg
