      content="Personal website of Terese Wahlström — mechanical engineer working across AI-assisted workflows, knowledge systems, additive manufacturing, and engineering tooling."

      content="Personal website of Terese Wahlström — mechanical engineer working across AI-assisted workflows, knowledge systems, additive manufacturing, and engineering tooling."
    />
    <meta id="theme-color" name="theme-color" content="#F8F9F7" />
    <title>Terese W personal website</title>
    <link id="app-icon" rel="icon" href="assets/t1_logo/t1_logo_favicon_dark.svg" type="image/svg+xml" />
    <link id="app-shortcut-icon" rel="shortcut icon" href="assets/t1_logo/t1_logo_favicon_dark.svg" type="image/svg+xml" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Terese Wahlström",
        "url": "https://www.t1grid.com/",
        "jobTitle": "Mechanical Engineer",
        "description": "Mechanical engineer working across AI-assisted workflows, knowledge systems, additive manufacturing, and engineering tooling.",
        "worksFor": {
          "@type": "Organization",
          "name": "T1 grid"
        },
        "sameAs": ["https://www.linkedin.com/in/teresewahlstrom"]
      }
    </script>
    <script>
      (function () {
        var darkModeQuery = window.matchMedia('(prefers-color-scheme: dark)');
        var themeColor = document.getElementById('theme-color');
        var iconLink = document.getElementById('app-icon');
        var shortcutIconLink = document.getElementById('app-shortcut-icon');
        var lightIcon = 'assets/t1_logo/t1_logo_favicon_dark.svg';
        var darkIcon = 'assets/t1_logo/t1_logo_favicon_light.svg';

        function applyBrowserTheme(event) {
          var prefersDark = event.matches;
          var iconHref = prefersDark ? darkIcon : lightIcon;

          themeColor.setAttribute('content', prefersDark ? '#212835' : '#F8F9F7');
          iconLink.setAttribute('href', iconHref);
          shortcutIconLink.setAttribute('href', iconHref);
        }

        applyBrowserTheme(darkModeQuery);
        darkModeQuery.addEventListener('change', applyBrowserTheme);
      })();
    </script>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #F8F9F7;
      }
      #app {
        height: 100%;
        width: 100%;
        position: fixed;
        top: 0;
        left: 0;
        background: #F8F9F7;
      }
      img {
        -webkit-user-drag: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
